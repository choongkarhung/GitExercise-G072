<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reality Check - BrokeBite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Reality Check</h2>
        <p>Be honest. This is for your own good.</p>

        <div id="message-box" class="hidden"></div>

        <form id="setup-form">
            <label for="balance">How much money do you have left? (RM)</label>
            <input type="number" id="balance" name="balance" 
                   placeholder="e.g. 30.00" step="0.01" min="0" required>

            <label for="days">How many days until your allowance arrives?</label>
            <input type="number" id="days" name="days" 
                   placeholder="e.g. 4" min="1" max="31" required>

            <button type="submit">Optimize My Survival</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='setup.js') }}"></script>
</body>
</html>

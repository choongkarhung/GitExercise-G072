<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reality Check - BrokeBite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="grid-overlay"></div>

    <nav class="navbar">
        <span class="brand-nav">🍜 <span>Broke</span>Bite</span>
        <span class="user-greeting">Hey, {{ session['username'] }}!</span>
        <button class="logout-btn" id="logout-btn">Logout</button>
    </nav>

    <div class="container">
        <div class="card-body">

            <span class="pill-tag">reality check</span>
            <h2>How bad is it? 💸</h2>
            <p class="subtitle">Be honest. No judgment. The more accurate you are, the better your meal plan will be.</p>

            <div id="message-box" class="hidden"></div>

            <div class="info-box">
                This helps us figure out your <strong>daily budget</strong> so we can suggest meals that actually fit your wallet.
            </div>

            <form id="setup-form">
                <label for="balance">Money left in your wallet (RM)</label>
                <div class="input-prefix-wrap">
                    <span class="prefix">RM</span>
                    <input type="number" id="balance" name="balance"
                           placeholder="0.00" step="0.01" min="0.01" required>
                </div>

                <label for="days">Days until your next allowance</label>
                <input type="number" id="days" name="days"
                       placeholder="e.g. 4" min="1" max="31" required>

                <button type="submit">Show me how to survive 🚀</button>
            </form>

        </div>
    </div>

    <script src="{{ url_for('static', filename='setup.js') }}"></script>
    <script>
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch('/logout', { method: 'POST' });
            window.location.href = '/';
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='menu.css') }}">
</head>
<body class="menu-body">

    <div class="blob-canvas">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="blob blob-5"></div>
    </div>
    <div class="grid-overlay"></div>

    <nav class="navbar">
        <span class="brand-nav">🍜 <span>Broke</span>Bite</span>
        <div class="nav-links">
            <a href="/dashboard" class="nav-link">📊 Dashboard</a>
            <a href="/mealplan" class="nav-link">🍽️ Meal Plan</a>
            <a href="/calorie" class="nav-link">🔥 Calories</a>
            <a href="/menu" class="nav-link nav-link-active">📖 Menu</a>
            <a href="/admin" class="nav-link">⚙️ Admin Panel</a>
        </div>
        <div class="nav-right">
            <span class="user-greeting">Hey, {{ username }}!</span>
            <button class="logout-btn" id="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="menu-wrapper">
        <header class="menu-header">
            <span class="pill-tag">Campus Dining</span>
            <h1>Restaurant Menu</h1>
            <p class="menu-sub">Browse available food options, current stalls, and calorie counts around campus.</p>
        </header>

        <section class="table-section card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Restaurant</th>
                            <th>Price (RM)</th>
                            <th>Category</th>
                            <th>Calories</th>
                        </tr>
                    </thead>
                    <tbody id="live-menu-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tableBody = document.getElementById('live-menu-body');
            try {
                const response = await fetch('/api/food_items');
                if (!response.ok) throw new Error('Failed to fetch items');

                const foodItems = await response.json();
                tableBody.innerHTML = '';

                foodItems.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${item.name}</strong></td>
                        <td>${item.stall}</td>
                        <td class="price-cell">RM ${parseFloat(item.price).toFixed(2)}</td>
                        <td class="category-cell">${item.category}</td>
                        <td class="calories-cell">${item.calories} kcal</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error rendering menu:', error);
                tableBody.innerHTML = '<tr><td colspan="5" style="color:var(--red-text);text-align:center;">Error loading menu data.</td></tr>';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch('/logout', { method: 'POST' });
            window.location.href = '/';
        });
    </script>
</body>
</html>

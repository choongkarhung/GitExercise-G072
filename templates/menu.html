<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f9f9f9; }
        .nav-header { margin-bottom: 20px; padding: 10px 0; border-bottom: 1px solid #ddd; }
        .nav-header a { text-decoration: none; color: #007bff; margin-right: 15px; font-weight: bold; }
        table { border-collapse: collapse; width: 100%; max-width: 1000px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th, td { border: 1px solid #dddddd; text-align: left; padding: 12px; }
        th { background-color: #f2f2f2; }
        tr:nth-child(even) { background-color: #f6f6f6; }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="{{ url_for('dashboard') }}">📊 Dashboard</a>
        <a href="{{ url_for('mealplan') }}">🍲 Meal Planner</a>
        <a href="{{ url_for('admin') }}">⚙️ Admin Control Panel</a>
    </div>

    <h1>Restaurant Menu</h1>
    <table>
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Restaurant</th>
                <th>Price (RM)</th>
                <th>Category</th>
                <th>Calories</th>
            </tr>
        </thead>
        <tbody id="live-menu-body">
            </tbody>
    </table>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tableBody = document.getElementById('live-menu-body');
            try {
                const response = await fetch('/api/food_items');
                if (!response.ok) throw new Error('Failed to fetch items');
                
                const foodItems = await response.json();
                tableBody.innerHTML = ''; 

                foodItems.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${item.name}</strong></td>
                        <td>${item.stall}</td>
                        <td>RM ${parseFloat(item.price).toFixed(2)}</td>
                        <td>${item.category}</td>
                        <td>${item.calories} kcal</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error rendering menu:', error);
                tableBody.innerHTML = '<tr><td colspan="5" style="color: red; text-align: center;">Error loading menu database data.</td></tr>';
            }
        });
    </script>
</body>
</html>

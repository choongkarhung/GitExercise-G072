<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrokeBite - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="grid-overlay"></div>

    <div class="container">
        <div class="card-body">

            <div class="brand">
                <span class="brand-emoji">🍜</span>
                <h1><span>Broke</span>Bite</h1>
                <p class="brand-sub">Survive the week. One meal at a time.</p>
            </div>

            <div id="message-box" class="hidden"></div>

            <p class="section-label">Login</p>
            <form id="login-form">
                <label for="login-user">Username</label>
                <input type="text" id="login-user" placeholder="your username" required>
                <label for="login-pass">Password</label>
                <input type="password" id="login-pass" placeholder="••••••••" required>
                <button type="submit">Login</button>
            </form>

            <hr>

            <p class="section-label">New here?</p>
            <form id="register-form">
                <label for="reg-user">Username</label>
                <input type="text" id="reg-user" placeholder="choose a username" required>
                <label for="reg-pass">Password</label>
                <input type="password" id="reg-pass" placeholder="••••••••" required>
                <button type="submit" class="btn-register">Create account</button>
            </form>

        </div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Calculator - BrokeBite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='calorie.css') }}">
</head>
<body class="dashboard-body">
 
    <div class="blob-canvas">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="blob blob-5"></div>
    </div>
    <div class="grid-overlay"></div>
 
    <!-- NAVBAR -->
    <nav class="navbar">
        <span class="brand-nav">🍜 <span>Broke</span>Bite</span>
        <div class="nav-links">
            <a href="/dashboard" class="nav-link">📊 Dashboard</a>
            <a href="/mealplan" class="nav-link">🍽️ Meal Plan</a>
            <a href="/calorie" class="nav-link nav-link-active">🔥 Calories</a>
        </div>
        <div class="nav-right">
            <span class="user-greeting">Hey, {{ username }}! 👋</span>
            <button class="logout-btn" id="logout-btn">Logout</button>
        </div>
    </nav>

       <!-- MAIN -->
    <div class="calorie-wrapper">
 
        <!-- HEADER -->
        <div class="cal-header">
            <div>
                <span class="pill-tag">Calorie Calculator</span>
                <h2 class="dash-title">What does your body need? 🔥</h2>
                <p class="dash-sub">Enter your details and we'll calculate your BMR, TDEE, and daily calorie target.</p>
            </div>
        </div>
 
        <!-- TWO-COLUMN LAYOUT -->
        <div class="cal-layout">
 
            <!-- LEFT: INPUT FORM -->
            <div class="cal-form-panel">
                <div class="panel-header">
                    <h3>Your Info</h3>
                    <span class="panel-sub">Used for Mifflin-St Jeor BMR calculation</span>
                </div>
 
                <div id="cal-msg" class="hidden"></div>
 
                <div class="cal-form">
 
                    <!-- Age & Gender row -->
                    <div class="form-row-2">
                        <div class="form-group">
                            <label>Age</label>
                            <input type="number" id="cal-age" placeholder="e.g. 20" min="10" max="100">
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <div class="gender-toggle">
                                <button class="gender-btn active" data-gender="male" id="btn-male">♂ Male</button>
                                <button class="gender-btn" data-gender="female" id="btn-female">♀ Female</button>
                            </div>
                        </div>
                    </div>
 
                    <!-- Height & Weight row -->
                    <div class="form-row-2">
                        <div class="form-group">
                            <label>Height (cm)</label>
                            <div class="input-prefix-wrap">
                                <span class="prefix">cm</span>
                                <input type="number" id="cal-height" placeholder="e.g. 170" min="100" max="250" class="input-suffix">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Weight (kg)</label>
                            <div class="input-prefix-wrap">
                                <span class="prefix">kg</span>
                                <input type="number" id="cal-weight" placeholder="e.g. 65" min="30" max="300" class="input-suffix">
                            </div>
                        </div>
                    </div>
